<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theme Toggle Demo</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <main class="app-shell">
    <section class="card">
      <p class="eyebrow">Product for Study</p>
      <h1>Choose your viewing mode.</h1>
      <p class="description">
        Switch between dark mode and white mode. Your preference stays saved for the next visit.
      </p>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-live="polite">
        Switch to dark mode
      </button>
    </section>
  </main>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
