name: Deploy Site

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set Deploy Variables
        id: vars
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            echo "asset_version=pr-${PR_NUMBER}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "output_dir=site-preview" >> "$GITHUB_OUTPUT"
            echo "preview_url=https://${{ github.repository_owner }}.github.io/${REPO_NAME}/previews/pr-${PR_NUMBER}/" >> "$GITHUB_OUTPUT"
          else
            echo "asset_version=prod-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "output_dir=site" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Static Files
        run: node scripts/prepare-static.mjs --out "${{ steps.vars.outputs.output_dir }}" --version "${{ steps.vars.outputs.asset_version }}"

      - name: Deploy Production Site
        if: github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: site
          clean: true
          clean-exclude: |
            previews

      - name: Deploy PR Preview
        if: github.event_name == 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: site-preview
          target-folder: previews/pr-${{ github.event.pull_request.number }}
          clean: true

      - name: Comment Preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.vars.outputs.preview_url }}
        with:
          script: |
            const marker = '<!-- preview-url-comment -->';
            const body = `${marker}\nPreview URL: ${process.env.PREVIEW_URL}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
